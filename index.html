<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>VANOA Delivery Note</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
:root {
    --black:#111;
    --gray:#777;
    --bg:#f5f5f5;
}

body {
    margin:0;
    font-family: Inter, sans-serif;
    background:var(--bg);
}

/* LAYOUT */
.container {
    display:flex;
    min-height:100vh;
}

/* PANEL */
.panel {
    width:320px;
    background:#111;
    color:white;
    padding:20px;
}

.panel input, .panel select {
    width:100%;
    padding:12px;
    margin-top:6px;
    border:none;
    border-radius:6px;
}

.panel button {
    width:100%;
    padding:14px;
    margin-top:10px;
    border:none;
    border-radius:6px;
    background:white;
    font-weight:bold;
    cursor:pointer;
}

/* PREVIEW */
.preview {
    flex:1;
    padding:20px;
}

/* DOCUMENT */
.invoice-card {
    width:210mm;
    min-height:297mm;
    background:white;
    margin:auto;
    padding:60px;
    position:relative;
}

/* HEADER */
.header-main {
    display:flex;
    justify-content:space-between;
    margin-bottom:50px;
}

.brand-logo {
    font-size:24px;
    font-weight:800;
}

.logo-box {
    background:black;
    color:white;
    padding:0 8px;
}

.brand-info {
    font-size:13px;
    color:#666;
}

.doc-type h1 {
    font-size:48px;
    margin:0;
}

.doc-number {
    color:#777;
}

/* BILLING */
.billing-grid {
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:40px;
    margin-bottom:40px;
}

.billing-title {
    font-weight:bold;
    border-bottom:2px solid black;
    margin-bottom:10px;
}

/* TABLE */
table {
    width:100%;
    border-collapse:collapse;
}

th {
    background:black;
    color:white;
    padding:12px;
}

td {
    padding:12px;
    border-bottom:1px solid #eee;
}

td input {
    width:100%;
    padding:6px;
}

/* SUMMARY */
.summary-container {
    display:flex;
    justify-content:space-between;
    margin-top:30px;
}

.terms-box {
    width:50%;
    font-size:12px;
    color:#666;
}

.totals-box {
    width:35%;
}

.total-row {
    display:flex;
    justify-content:space-between;
    padding:6px 0;
}

.grand-total {
    border-top:2px solid black;
    font-weight:bold;
    font-size:18px;
}

/* FOOTER */
.footer-minimal {
    position:absolute;
    bottom:40px;
    left:60px;
    right:60px;
    display:flex;
    justify-content:space-between;
    font-size:12px;
    color:#777;
}

/* WATERMARK */
.watermark {
    position:absolute;
    right:20px;
    top:50%;
    transform:rotate(90deg);
    font-size:100px;
    color:rgba(0,0,0,0.03);
}
</style>
</head>

<body>

<div class="container">

<div class="panel">
<h2>Control Panel</h2>

<input id="docNumber" placeholder="Number">
<input id="clientName" placeholder="Client Name">
<input id="clientAddress" placeholder="Address">
<input id="taxId" placeholder="Tax ID">

<select id="payment">
<option>Cash</option>
<option>Transfer</option>
<option>Check</option>
</select>

<button onclick="addRow()">+ Add Item</button>
<button onclick="downloadPDF()">Download PDF</button>
</div>

<div class="preview">
<div class="invoice-card" id="doc">

<div class="watermark">VANOA</div>

<header class="header-main">
<div>
<div class="brand-logo"><span class="logo-box">V</span> VANOA</div>
<div class="brand-info">Tunisia</div>
</div>

<div class="doc-type">
<h1>Delivery Note</h1>
<div class="doc-number" id="pNumber"></div>
<div id="pDate"></div>
</div>
</header>

<div class="billing-grid">
<div>
<div class="billing-title">Billing To</div>
<div id="pClient"></div>
</div>

<div>
<div class="billing-title">Details</div>
<div>Tax: <span id="pTax"></span></div>
<div>Payment: <span id="pPayment"></span></div>
</div>
</div>

<table>
<thead>
<tr>
<th>Description</th>
<th>Qty</th>
<th>Unit</th>
<th>Total</th>
<th></th>
</tr>
</thead>
<tbody id="rows"></tbody>
</table>

<div class="summary-container">
<div class="terms-box">
<b>Terms</b>
<p>Goods delivered in good condition.</p>
</div>

<div class="totals-box">
<div class="total-row"><span>Subtotal</span><span id="sub"></span></div>
<div class="total-row"><span>VAT</span><span id="vat"></span></div>
<div class="total-row"><span>Stamp</span><span>1.000</span></div>
<div class="total-row grand-total"><span>NET</span><span id="net"></span></div>
</div>
</div>

<div class="footer-minimal">
<div>vanoa.tn</div>
<div>@vanoa</div>
<div>MF: XXXXX</div>
</div>

</div>
</div>

</div>

<script>
const { jsPDF } = window.jspdf;

const rowsEl = document.getElementById("rows");

const sub = document.getElementById("sub");
const vatEl = document.getElementById("vat");
const netEl = document.getElementById("net");

const pNumber = document.getElementById("pNumber");
const pDate = document.getElementById("pDate");
const pClient = document.getElementById("pClient");

const docNumber = document.getElementById("docNumber");
const clientName = document.getElementById("clientName");
const clientAddress = document.getElementById("clientAddress");
const taxId = document.getElementById("taxId");
const payment = document.getElementById("payment");

const f = n => (n||0).toFixed(3);

pDate.innerText = new Date().toLocaleDateString();

function addRow(){
    let tr = document.createElement("tr");

    tr.innerHTML = `
    <td><input></td>
    <td><input type="number"></td>
    <td><input type="number"></td>
    <td class="t">0.000</td>
    <td><button onclick="removeRow(this)">✕</button></td>
    `;

    rowsEl.appendChild(tr);

    tr.querySelectorAll("input").forEach(i=>{
        i.addEventListener("input", update);
    });

    update();
}

function removeRow(btn){
    btn.closest("tr").remove();
    update();
}

function update(){
    let subtotal=0;

    document.querySelectorAll("#rows tr").forEach(tr=>{
        let qty = parseFloat(tr.children[1].children[0].value)||0;
        let price = parseFloat(tr.children[2].children[0].value)||0;

        let total = qty*price;
        tr.querySelector(".t").innerText = f(total);
        subtotal+=total;
    });

    let vat = subtotal*0.19;
    let net = subtotal+vat+1;

    sub.innerText = f(subtotal);
    vatEl.innerText = f(vat);
    netEl.innerText = f(net);

    pNumber.innerText = "#"+docNumber.value;

    pClient.innerHTML =
        `${clientName.value}<br>${clientAddress.value}`;

    document.getElementById("pTax").innerText = taxId.value;
    document.getElementById("pPayment").innerText = payment.value;
}

async function downloadPDF(){
    const element = document.getElementById("doc");

    const canvas = await html2canvas(element, { scale:2 });

    const imgData = canvas.toDataURL("image/png");

    const pdf = new jsPDF("p","mm","a4");

    const width = 210;
    const height = canvas.height * width / canvas.width;

    pdf.addImage(imgData, "PNG", 0, 0, width, height);

    pdf.save("DeliveryNote-"+docNumber.value+".pdf");
}

document.querySelectorAll("input,select")
.forEach(i=>i.addEventListener("input",update));

addRow();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>VANOA Delivery Note</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
:root{
    --text:#1f1f1f;
    --muted:#6b6b6b;
    --line:#eaeaea;
}

*{box-sizing:border-box}

body{
    margin:0;
    font-family:Inter, sans-serif;
    background:#f5f5f5;
}

/* APP LAYOUT */
.container{
    display:flex;
    min-height:100vh;
}

/* PANEL */
.panel{
    width:320px;
    background:#111;
    color:#fff;
    padding:20px;
}

.panel h2{margin:0 0 10px 0}

.panel h3{
    font-size:12px;
    color:#aaa;
    margin-top:18px;
    letter-spacing:1px;
    text-transform:uppercase;
}

.panel input, .panel select{
    width:100%;
    padding:12px;
    margin-top:6px;
    border:none;
    border-radius:6px;
}

.panel button{
    width:100%;
    padding:14px;
    margin-top:10px;
    border:none;
    border-radius:6px;
    background:#fff;
    font-weight:700;
    cursor:pointer;
}

/* DOCUMENT */
.preview{
    flex:1;
    padding:30px;
}

.doc{
    width:210mm;
    min-height:297mm;
    background:white;
    margin:auto;
    padding:60px;
    position:relative;
}

/* =========================
   PREMIUM SAAS HEADER
========================= */

.header{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    margin-bottom:45px;
}

/* LEFT BRAND BLOCK */
.brand{
    display:flex;
    gap:14px;
    align-items:flex-start;
}

/* LOGO */
.brand img{
    width:4.5cm;
    height:auto;
    object-fit:contain;
}

/* BRAND TEXT */
.brand-text{
    display:flex;
    flex-direction:column;
}

.brand-title{
    font-size:14px;
    font-weight:700;
    letter-spacing:1px;
    text-transform:uppercase;
}

.brand-sub{
    font-size:12px;
    color:var(--muted);
    margin-top:6px;
    line-height:1.4;
}

/* RIGHT DOC INFO */
.doc-info{
    text-align:right;
}

.doc-info h1{
    font-size:40px;
    margin:0;
    font-weight:900;
    letter-spacing:-1px;
}

.doc-number{
    margin-top:6px;
    font-size:14px;
    color:var(--muted);
}

.doc-date{
    font-size:13px;
    color:var(--muted);
    margin-top:4px;
}

/* BILLING */
.billing{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:40px;
    margin-bottom:35px;
}

.block-title{
    font-size:12px;
    font-weight:700;
    text-transform:uppercase;
    border-bottom:2px solid #000;
    display:inline-block;
    padding-bottom:4px;
    margin-bottom:10px;
}

/* TABLE */
table{
    width:100%;
    border-collapse:collapse;
}

th{
    background:#000;
    color:#fff;
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:1px;
    padding:12px;
}

td{
    padding:14px;
    border-bottom:1px solid var(--line);
    font-size:14px;
}

/* TOTALS */
.totals{
    margin-top:35px;
    max-width:340px;
    margin-left:auto;
}

.row{
    display:flex;
    justify-content:space-between;
    padding:6px 0;
    font-size:14px;
}

.grand{
    border-top:2px solid #000;
    margin-top:10px;
    padding-top:10px;
    font-size:18px;
    font-weight:900;
}

/* FOOTER */
.footer{
    position:absolute;
    bottom:50px;
    left:60px;
    right:60px;
    display:flex;
    justify-content:space-between;
    font-size:12px;
    color:var(--muted);
    border-top:1px solid var(--line);
    padding-top:15px;
}

/* MOBILE */
@media(max-width:900px){
    .container{flex-direction:column}
    .panel{width:100%}
    .doc{width:100%; padding:25px}
}
</style>
</head>

<body>

<div class="container">

<!-- PANEL -->
<div class="panel">
<h2>Control Panel</h2>

<h3>Document</h3>
<input id="docNumber" placeholder="Number">

<h3>Client</h3>
<input id="clientName" placeholder="Name">
<input id="clientAddress" placeholder="Address">
<input id="taxId" placeholder="Tax ID">

<h3>Payment</h3>
<select id="payment">
<option>Cash</option>
<option>Transfer</option>
<option>Check</option>
</select>

<button onclick="addRow()">+ Add Item</button>
<button onclick="exportPDF()">Export PDF</button>
</div>

<!-- DOCUMENT -->
<div class="preview">
<div class="doc" id="doc">

<!-- HEADER -->
<div class="header">

<div class="brand">
<img src="https://raw.githubusercontent.com/ShadowHD6/VANOA-Delivery-Note/main/VANOA%20Logo.svg">

<div class="brand-text">
<div class="brand-title">VANOA Studio</div>
<div class="brand-sub">
+216 52 287 812<br>
contact@vanoa.net<br>
Tunisia
</div>
</div>

</div>

<div class="doc-info">
<h1>Delivery Note</h1>
<div class="doc-number" id="pNumber"></div>
<div class="doc-date" id="pDate"></div>
</div>

</div>

<!-- BILLING -->
<div class="billing">
<div>
<div class="block-title">Billing To</div>
<div id="pClient"></div>
</div>

<div>
<div class="block-title">Details</div>
<div>Tax ID: <span id="pTax"></span></div>
<div>Payment: <span id="pPayment"></span></div>
</div>
</div>

<!-- TABLE -->
<table>
<thead>
<tr>
<th>Description</th>
<th>Qty</th>
<th>Unit</th>
<th>Total</th>
<th></th>
</tr>
</thead>
<tbody id="rows"></tbody>
</table>

<!-- TOTALS -->
<div class="totals">
<div class="row"><span>Subtotal</span><span id="sub">0.000</span></div>
<div class="row"><span>VAT 19%</span><span id="vat">0.000</span></div>
<div class="row"><span>Stamp</span><span>1.000</span></div>
<div class="row grand"><span>NET</span><span id="net">0.000</span></div>
</div>

<!-- FOOTER -->
<div class="footer">
<div>www.vanoa.net</div>
<div>@vanoa</div>
<div>MF: 00000/Z/A/M/000</div>
</div>

</div>
</div>

</div>

<script>
const { jsPDF } = window.jspdf;

const rowsEl = document.getElementById("rows");

const sub = document.getElementById("sub");
const vatEl = document.getElementById("vat");
const netEl = document.getElementById("net");

const docNumber = document.getElementById("docNumber");
const clientName = document.getElementById("clientName");
const clientAddress = document.getElementById("clientAddress");
const taxId = document.getElementById("taxId");
const payment = document.getElementById("payment");

const pNumber = document.getElementById("pNumber");
const pDate = document.getElementById("pDate");
const pClient = document.getElementById("pClient");
const pTax = document.getElementById("pTax");
const pPayment = document.getElementById("pPayment");

const f = n => (n||0).toFixed(3);

pDate.innerText = new Date().toLocaleDateString();

/* ROWS */
function addRow(){
    const tr = document.createElement("tr");

    tr.innerHTML = `
    <td><input></td>
    <td><input type="number"></td>
    <td><input type="number"></td>
    <td class="t">0.000</td>
    <td><button onclick="removeRow(this)">✕</button></td>
    `;

    rowsEl.appendChild(tr);
    tr.querySelectorAll("input").forEach(i=>i.addEventListener("input",update));
    update();
}

function removeRow(btn){
    btn.closest("tr").remove();
    update();
}

/* UPDATE */
function update(){
    let subtotal = 0;

    document.querySelectorAll("#rows tr").forEach(tr=>{
        let q = +tr.children[1].children[0].value || 0;
        let p = +tr.children[2].children[0].value || 0;
        let t = q*p;

        tr.querySelector(".t").innerText = f(t);
        subtotal += t;
    });

    let vat = subtotal * 0.19;
    let net = subtotal + vat + 1;

    sub.innerText = f(subtotal);
    vatEl.innerText = f(vat);
    netEl.innerText = f(net);

    pNumber.innerText = "#" + docNumber.value;

    pClient.innerHTML = `${clientName.value}<br>${clientAddress.value}`;
    pTax.innerText = taxId.value;
    pPayment.innerText = payment.value;
}

/* ===== TRUE VECTOR PDF EXPORT (NO SCREENSHOT) ===== */
function exportPDF(){

    const pdf = new jsPDF("p","mm","a4");

    const margin = 20;
    let y = 20;

    // HEADER
    pdf.setFont("helvetica","bold");
    pdf.setFontSize(22);
    pdf.text("Delivery Note", 150, y);

    pdf.setFontSize(10);
    pdf.setFont("helvetica","normal");
    pdf.text("#" + docNumber.value, 150, y+8);
    pdf.text(pDate.innerText, 150, y+14);

    // CLIENT
    y += 25;
    pdf.setFontSize(12);
    pdf.setFont("helvetica","bold");
    pdf.text("Billing To", margin, y);

    pdf.setFont("helvetica","normal");
    pdf.setFontSize(10);
    pdf.text(clientName.value, margin, y+8);
    pdf.text(clientAddress.value, margin, y+14);

    // ITEMS HEADER
    y += 30;
    pdf.setFont("helvetica","bold");
    pdf.text("Description", margin, y);
    pdf.text("Qty", 100, y);
    pdf.text("Unit", 130, y);
    pdf.text("Total", 160, y);

    pdf.setFont("helvetica","normal");

    let rowY = y + 8;

    document.querySelectorAll("#rows tr").forEach(tr=>{
        const desc = tr.children[0].children[0].value;
        const qty = tr.children[1].children[0].value;
        const price = tr.children[2].children[0].value;
        const total = qty * price;

        pdf.text(desc || "-", margin, rowY);
        pdf.text(String(qty || 0), 100, rowY);
        pdf.text(String(price || 0), 130, rowY);
        pdf.text(f(total), 160, rowY);

        rowY += 8;
    });

    // TOTALS
    rowY += 10;

    pdf.setFont("helvetica","bold");
    pdf.text("Subtotal: " + sub.innerText, 130, rowY);
    pdf.text("VAT: " + vatEl.innerText, 130, rowY+6);
    pdf.text("Stamp: 1.000", 130, rowY+12);
    pdf.text("NET: " + netEl.innerText, 130, rowY+20);

    // FOOTER
    pdf.setFontSize(9);
    pdf.setFont("helvetica","normal");
    pdf.text("www.vanoa.net | @vanoa | MF: I304285/Z/A/M/000", margin, 285);

    pdf.save("DeliveryNote-" + docNumber.value + ".pdf");
}

addRow();
</script>

</body>
</html>

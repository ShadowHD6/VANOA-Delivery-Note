<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VANOA Delivery Note</title>

<link rel="icon" type="image/svg+xml" href="https://cdn.jsdelivr.net/gh/ShadowHD6/VANOA-Delivery-Note@main/Vanoa%20Favicom.svg">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
:root {
    --bg: #f6f7f9;
    --text: #111;
    --muted: #6b7280;
    --line: #e5e7eb;
}

* { box-sizing: border-box; }

body {
    margin: 0;
    font-family: Inter, sans-serif;
    background: var(--bg);
    color: var(--text);
}

.layout { display: flex; min-height: 100vh; }

/* SIDEBAR STYLES */
.sidebar {
    width: 340px;
    background: #0a0a0a;
    color: #fff;
    padding: 18px;
    height: 100vh;
    position: sticky;
    top: 0;
    overflow-y: auto;
    z-index: 10;
}

.sidebar.collapsed { width: 70px; }
.sidebar.collapsed .content { display: none; }

.toggle {
    width: 100%;
    padding: 10px;
    background: #fff;
    border: none;
    font-weight: 700;
    cursor: pointer;
    margin-bottom: 12px;
}

.sidebar h3 { font-size: 14px; margin-top: 20px; color: #aaa; text-transform: uppercase; }

input, select {
    width: 100%;
    padding: 10px;
    margin-top: 6px;
    border-radius: 8px;
    border: none;
    outline: none;
    background: #222;
    color: #fff;
}

input::placeholder { color: #666; }

.btn-group { margin-top: 25px; display: flex; flex-direction: column; gap: 10px; }
.btn { padding: 12px; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; transition: 0.2s; }
.btn-add { background: #fff; color: #000; }
.btn-pdf { background: #22c55e; color: #fff; }
.btn-img { background: #3b82f6; color: #fff; }
.btn:hover { opacity: 0.9; transform: translateY(-1px); }

/* MAIN PREVIEW AREA */
.main {
    flex: 1;
    padding: 40px;
    display: flex;
    justify-content: center;
    background: #525659;
}

/* A4 CONTAINER (Strict Scaling) */
.card {
    width: 210mm;
    height: 297mm;
    background: #fff;
    padding: 15px; /* Offset from A4 edge */
    box-sizing: border-box;
    box-shadow: 0 10px 50px rgba(0,0,0,0.3);
}

/* INNER FRAME (1mm Outline) */
.card-inner {
    border: 1mm solid #000;
    height: 100%;
    padding: 40px;
    display: flex;
    flex-direction: column;
    box-sizing: border-box;
    position: relative;
    overflow: hidden;
}

/* HEADER */
.header {
    display: flex;
    justify-content: space-between;
    margin-bottom: 40px;
}

.logo img { 
    width: 4.5cm; 
    max-height: 2.5cm;
    object-fit: contain;
    object-position: left top;
}

.doc-title { text-align: right; }
.doc-title h1 { margin: 0; font-size: 34px; font-weight: 900; }
.doc-meta { font-size: 13px; color: var(--muted); }

/* CLIENT INFO GRID */
.grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 40px;
    margin-bottom: 55px; /* Spacing between info and table */
}

.block-title {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    border-bottom: 2px solid #000;
    display: inline-block;
    margin-bottom: 10px;
}

.info-content { font-size: 14px; line-height: 1.5; }

/* TABLE */
table { width: 100%; border-collapse: collapse; }
th { background: #000; color: #fff; padding: 12px; font-size: 11px; text-transform: uppercase; text-align: left; }
td { border-bottom: 1px solid var(--line); font-size: 14px; padding: 0; }
td input { background: transparent; padding: 12px; color: #000; width: 100%; border-radius: 0; }

/* TOTALS BLOCK */
.totals-wrapper {
    display: flex;
    justify-content: flex-end;
    margin-top: auto; /* Pushes to bottom */
    margin-bottom: 100px; /* 100px from the bottom frame edge */
}

.totals { width: 280px; }
.row { display: flex; justify-content: space-between; padding: 6px 0; }
.grand { border-top: 2px solid #000; margin-top: 8px; padding-top: 10px; font-weight: 900; font-size: 20px; }

/* FOOTER */
.footer {
    position: absolute;
    bottom: 20px;
    left: 40px;
    right: 40px;
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: var(--muted);
    border-top: 1px solid var(--line);
    padding-top: 12px;
}

.hide-on-export { width: 40px; text-align: center; }
.delete-btn { background: #ff4d4d; color: #fff; border: none; padding: 5px 10px; cursor: pointer; border-radius: 4px; }

/* EXPORT OVERRIDES */
.is-exporting { box-shadow: none !important; }
.export-text { padding: 12px; display: inline-block; }
</style>
</head>
<body>

<div class="layout">
    <div class="sidebar" id="sidebar">
        <button class="toggle" onclick="toggle()">☰</button>
        <div class="content">
            <h3>Document</h3>
            <input id="docNumber" placeholder="Invoice Number" value="0001">
            
            <h3>Company</h3>
            <input id="companyName" placeholder="Company Name" value="VANOA">
            <input id="companyPhone" placeholder="Phone (+216 52 287 812)">
            <input id="companyEmail" placeholder="Email (contact@vanoa.net)">
            <input id="companyAddress" placeholder="Address (Mahdia, Tunisia)">
            
            <h3>Client</h3>
            <input id="clientName" placeholder="Client Name">
            <input id="clientAddress" placeholder="Client Address">
            <input id="clientMF" placeholder="MF (Tax ID)">
            
            <h3>Payment</h3>
            <select id="payment">
                <option>Cash</option>
                <option>Transfer</option>
                <option>Check</option>
            </select>

            <div class="btn-group">
                <button class="btn btn-add" onclick="addRow()">+ Add Item</button>
                <button class="btn btn-pdf" onclick="exportPDF()">Export PDF</button>
                <button class="btn btn-img" onclick="exportImage()">Download Image</button>
            </div>
        </div>
    </div>

    <div class="main">
        <div class="card" id="documentCard">
            <div class="card-inner">
                
                <div class="header">
                    <div>
                        <div class="logo">
                            <img src="https://raw.githubusercontent.com/ShadowHD6/VANOA-Delivery-Note/main/VANOA%20Logo.svg" crossorigin="anonymous">
                        </div>
                        <div class="company info-content" id="companyInfo"></div>
                    </div>
                    <div class="doc-title">
                        <h1>Delivery Note</h1>
                        <div class="doc-meta" id="pNumber">#0001</div>
                        <div class="doc-meta" id="pDate"></div>
                    </div>
                </div>

                <div class="grid">
                    <div>
                        <div class="block-title">Billing To</div>
                        <div class="info-content" id="pClient">Client Name</div>
                    </div>
                    <div>
                        <div class="block-title">Client Details</div>
                        <div class="info-content">
                            <div>MF: <span id="pMF">000000</span></div>
                            <div>Payment: <span id="pPayment">Cash</span></div>
                        </div>
                    </div>
                </div>

                <table id="itemsTable">
                    <thead>
                        <tr>
                            <th>Description</th>
                            <th style="width:80px">Qty</th>
                            <th style="width:120px">Unit</th>
                            <th style="width:120px">Total</th>
                            <th class="hide-on-export"></th>
                        </tr>
                    </thead>
                    <tbody id="rows"></tbody>
                </table>

                <div class="totals-wrapper">
                    <div class="totals">
                        <div class="row"><span>Subtotal</span><span id="sub">0.000</span></div>
                        <div class="row"><span>VAT 19%</span><span id="vat">0.000</span></div>
                        <div class="row"><span>Stamp</span><span>1.000</span></div>
                        <div class="row grand"><span>NET</span><span id="net">0.000</span></div>
                    </div>
                </div>

                <div class="footer">
                    <div>www.vanoa.tn</div>
                    <div>@vanoa</div>
                    <div>MF: I304285/Z/A/M/000</div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
// Sidebar Toggle
function toggle() { document.getElementById("sidebar").classList.toggle("collapsed"); }

// Listeners for real-time updates
const inputList = ['docNumber', 'companyName', 'companyPhone', 'companyEmail', 'companyAddress', 'clientName', 'clientAddress', 'clientMF', 'payment'];
inputList.forEach(id => document.getElementById(id).addEventListener('input', update));

function update() {
    // Meta Info
    document.getElementById('pNumber').innerText = "#" + (document.getElementById('docNumber').value || "0001");
    document.getElementById('pDate').innerText = new Date().toLocaleDateString();
    
    // Client Info
    document.getElementById('pMF').innerText = document.getElementById('clientMF').value || "000000";
    document.getElementById('pPayment').innerText = document.getElementById('payment').value;
    document.getElementById('pClient').innerHTML = `<strong>${document.getElementById('clientName').value || 'Client Name'}</strong><br>${document.getElementById('clientAddress').value || ''}`;
    
    // Company Info with Defaults
    const cName = document.getElementById('companyName').value || "VANOA";
    const cPhone = document.getElementById('companyPhone').value || "+216 52 287 812";
    const cEmail = document.getElementById('companyEmail').value || "contact@vanoa.net";
    const cAddress = document.getElementById('companyAddress').value || "Mahdia, Tunisia";
    document.getElementById('companyInfo').innerHTML = `<strong>${cName}</strong><br>${cPhone}<br>${cEmail}<br>${cAddress}`;

    // Calculations
    let subtotal = 0;
    document.querySelectorAll("#rows tr").forEach(tr => {
        const q = +tr.querySelector('.qty').value || 0;
        const u = +tr.querySelector('.unit').value || 0;
        const total = q * u;
        tr.querySelector('.total-cell').innerText = total.toFixed(3);
        subtotal += total;
    });

    const vat = subtotal * 0.19;
    document.getElementById('sub').innerText = subtotal.toFixed(3);
    document.getElementById('vat').innerText = vat.toFixed(3);
    document.getElementById('net').innerText = (subtotal + vat + 1.000).toFixed(3);
}

function addRow() {
    const tr = document.createElement("tr");
    tr.innerHTML = `
        <td><input type="text" class="desc" placeholder="Item Description"></td>
        <td><input type="number" class="qty" value="1"></td>
        <td><input type="number" class="unit" value="0.000" step="0.001"></td>
        <td class="total-cell" style="padding:12px">0.000</td>
        <td class="hide-on-export"><button class="delete-btn" onclick="this.closest('tr').remove();update()">✕</button></td>
    `;
    document.getElementById("rows").appendChild(tr);
    tr.querySelectorAll('input').forEach(i => i.addEventListener('input', update));
    update();
}

// Prepare document for export (convert inputs to text)
function prepareForExport() {
    const element = document.getElementById('documentCard');
    const inputElements = element.querySelectorAll('input');
    const replacements = [];

    inputElements.forEach(i => {
        const span = document.createElement('span');
        span.className = 'export-text';
        // Logic to show value or placeholder if it's one of the defaults
        span.innerText = i.value || (i.placeholder.includes('(') ? i.placeholder.split('(')[1].replace(')', '') : '');
        i.style.display = 'none';
        i.parentNode.insertBefore(span, i);
        replacements.push({span, input: i});
    });
    
    return replacements;
}

// Cleanup after export
function cleanupAfterExport(replacements) {
    document.getElementById('documentCard').classList.remove('is-exporting');
    replacements.forEach(item => {
        item.span.remove();
        item.input.style.display = '';
    });
}

async function exportPDF() {
    const element = document.getElementById('documentCard');
    element.classList.add('is-exporting');
    const replacements = prepareForExport();

    const opt = {
        margin: 0,
        filename: `VANOA-DN-${document.getElementById('docNumber').value || 'Draft'}.pdf`,
        image: { type: 'jpeg', quality: 1 },
        html2canvas: { scale: 3, useCORS: true, letterRendering: true },
        jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
    };

    await html2pdf().set(opt).from(element).save();
    cleanupAfterExport(replacements);
}

async function exportImage() {
    const element = document.getElementById('documentCard');
    element.classList.add('is-exporting');
    const replacements = prepareForExport();

    // Use html2canvas directly (it's included in html2pdf bundle)
    const canvas = await html2canvas(element, {
        scale: 3,
        useCORS: true,
        backgroundColor: "#ffffff"
    });

    const link = document.createElement('a');
    link.download = `VANOA-DN-${document.getElementById('docNumber').value || 'Draft'}.png`;
    link.href = canvas.toDataURL("image/png");
    link.click();

    cleanupAfterExport(replacements);
}

// Initialize
addRow();
update();
</script>
</body>
</html>

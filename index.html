<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>VANOA Delivery Note</title>

<!-- ✅ FIXED FAVICON (NETLIFY SAFE) -->
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="icon" type="image/png" href="/favicon.png">

<!-- FONT -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">

<!-- PDF ENGINE -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{
    margin:0;
    font-family:Inter, sans-serif;
    background:#f6f7f9;
    color:#111;
}

.layout{display:flex; min-height:100vh;}

.sidebar{
    width:320px;
    background:#0b0b0b;
    color:white;
    padding:16px;
}

input,select{
    width:100%;
    padding:10px;
    margin:6px 0 12px;
    border-radius:8px;
    border:none;
}

button{
    width:100%;
    padding:10px;
    margin-top:10px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-weight:700;
}

.main{
    flex:1;
    padding:20px;
}

.card{
    background:#fff;
    padding:40px;
    border-radius:14px;
    max-width:900px;
    margin:auto;
    box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

.header{
    display:flex;
    justify-content:space-between;
    margin-bottom:30px;
}

.logo img{
    width:160px;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
}

td,th{
    padding:10px;
    border-bottom:1px solid #eee;
}
</style>
</head>

<body>

<div class="layout">

<div class="sidebar">
<h3>Invoice</h3>

<input id="client" placeholder="Client Name">
<input id="address" placeholder="Address">
<input id="invoice" placeholder="Invoice #">

<button onclick="addRow()">Add Item</button>
<button onclick="exportPDF()">Export PDF</button>
</div>

<div class="main">

<div class="card" id="invoiceBox">

<div class="header">
<div class="logo">
<img src="https://raw.githubusercontent.com/ShadowHD6/VANOA-Delivery-Note/main/VANOA%20Logo.svg"
crossorigin="anonymous">
</div>

<h2>Delivery Note</h2>
</div>

<div id="preview"></div>

<table>
<thead>
<tr>
<th>Item</th>
<th>Qty</th>
<th>Price</th>
</tr>
</thead>
<tbody id="rows"></tbody>
</table>

</div>

</div>
</div>

<script>
const rows=document.getElementById("rows");

function addRow(){
rows.innerHTML += `
<tr>
<td><input></td>
<td><input type="number"></td>
<td><input type="number"></td>
</tr>`;
}

function exportPDF(){

const element=document.getElementById("invoiceBox");

html2canvas(element,{
scale:2,
useCORS:true,
backgroundColor:"#fff"
}).then(canvas=>{

const img=canvas.toDataURL("image/png");

const pdf=new jspdf.jsPDF("p","mm","a4");

const width=210;
const height=(canvas.height*width)/canvas.width;

pdf.addImage(img,"PNG",0,0,width,height);
pdf.save("invoice.pdf");

});
}

addRow();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>VANOA Delivery Note</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
:root {
    --black:#111;
    --gray:#777;
    --bg:#f5f5f5;
}

* { box-sizing:border-box; }

body {
    margin:0;
    font-family: Inter, sans-serif;
    background:var(--bg);
}

/* LAYOUT */
.container {
    display:flex;
    min-height:100vh;
}

/* PANEL */
.panel {
    width:320px;
    background:#111;
    color:white;
    padding:20px;
}

.panel h3 {
    font-size:13px;
    color:#aaa;
    margin-top:20px;
}

.panel input, .panel select {
    width:100%;
    padding:12px;
    margin-top:6px;
    border:none;
    border-radius:6px;
}

.panel button {
    width:100%;
    padding:14px;
    margin-top:10px;
    border:none;
    border-radius:6px;
    background:white;
    font-weight:bold;
    cursor:pointer;
}

.panel button:hover { opacity:0.9; }
.panel button:active { transform:scale(0.98); }

/* PREVIEW */
.preview {
    flex:1;
    padding:20px;
    overflow:auto;
}

/* DOCUMENT */
.doc {
    width:210mm;
    min-height:297mm;
    background:white;
    margin:auto;
    padding:40px;
}

/* HEADER */
.header {
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    margin-bottom:20px;
}

.logo img {
    width:4cm;
}

.doc-info {
    text-align:right;
}

/* TABLE */
.table-wrap { overflow-x:auto; }

table {
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
    min-width:500px;
}

th {
    background:black;
    color:white;
    padding:10px;
}

td {
    padding:10px;
    border-bottom:1px solid #eee;
}

td input {
    width:100%;
    padding:6px;
}

/* TOTALS */
.totals {
    max-width:320px;
    margin-left:auto;
    margin-top:20px;
}

.line {
    display:flex;
    justify-content:space-between;
    margin:6px 0;
}

.grand {
    border-top:2px solid black;
    font-weight:bold;
    font-size:18px;
    padding-top:10px;
}

/* MOBILE */
@media (max-width:900px) {
    .container { flex-direction:column; }

    .panel {
        width:100%;
        position:sticky;
        top:0;
        z-index:10;
    }

    .doc {
        width:100%;
        padding:20px;
    }

    .header {
        flex-direction:column;
        gap:10px;
    }

    .doc-info { text-align:left; }
}

/* PRINT */
@page {
    size:A4;
    margin:10mm;
}

@media print {
    body * { visibility:hidden }
    .doc, .doc * { visibility:visible }

    .doc {
        position:absolute;
        left:0;
        top:0;
        width:100%;
    }
}
</style>
</head>

<body>

<div class="container">

<div class="panel">
<h2>Control Panel</h2>

<h3>Document</h3>
<input id="docNumber" placeholder="Number">

<h3>Client</h3>
<input id="clientName" placeholder="Name">
<input id="clientAddress" placeholder="Address">
<input id="taxId" placeholder="Tax ID">

<h3>Payment</h3>
<select id="payment">
<option>Cash</option>
<option>Transfer</option>
<option>Check</option>
</select>

<button onclick="addRow()">+ Add Item</button>
<button onclick="printPDF()">Save / Print</button>
</div>

<div class="preview">
<div class="doc">

<div class="header">

<div class="logo">
<img src="https://raw.githubusercontent.com/ShadowHD6/VANOA-Delivery-Note/main/VANOA%20Logo.svg">
</div>

<div class="doc-info">
<h1>Delivery Note</h1>
<div id="pNumber"></div>
<div id="pDate"></div>
</div>

</div>

<h3>Billing To</h3>
<div id="pClient"></div>

<div class="table-wrap">
<table>
<thead>
<tr>
<th>Description</th>
<th>Qty</th>
<th>Unit</th>
<th>Total</th>
<th></th>
</tr>
</thead>
<tbody id="rows"></tbody>
</table>
</div>

<div class="totals">
<div class="line"><span>Subtotal</span><span id="sub">0.000</span></div>
<div class="line"><span>VAT 19%</span><span id="vat">0.000</span></div>
<div class="line"><span>Stamp</span><span>1.000</span></div>
<div class="line grand"><span>NET</span><span id="net">0.000</span></div>
</div>

</div>
</div>

</div>

<script>
const rowsEl = document.getElementById("rows");

const sub = document.getElementById("sub");
const vatEl = document.getElementById("vat");
const netEl = document.getElementById("net");

const pNumber = document.getElementById("pNumber");
const pDate = document.getElementById("pDate");
const pClient = document.getElementById("pClient");

const docNumber = document.getElementById("docNumber");
const clientName = document.getElementById("clientName");
const clientAddress = document.getElementById("clientAddress");
const taxId = document.getElementById("taxId");
const payment = document.getElementById("payment");

const f = n => (n||0).toFixed(3);

pDate.innerText = new Date().toLocaleDateString();

function addRow(data={}) {
    let tr = document.createElement("tr");

    tr.innerHTML = `
    <td><input value="${data.desc||""}"></td>
    <td><input type="number" step="0.01" value="${data.qty||""}"></td>
    <td><input type="number" step="0.001" value="${data.price||""}"></td>
    <td class="t">0.000</td>
    <td><button onclick="removeRow(this)">✕</button></td>
    `;

    rowsEl.appendChild(tr);

    tr.querySelectorAll("input").forEach(i=>{
        i.addEventListener("input", update);
        i.addEventListener("keydown", e=>{
            if(e.key==="Enter") addRow();
        });
    });

    setTimeout(()=>tr.querySelector("input").focus(),50);

    update();
}

function removeRow(btn){
    btn.closest("tr").remove();
    update();
}

function update(){
    let subtotal=0;

    document.querySelectorAll("#rows tr").forEach(tr=>{
        let qty = parseFloat(tr.children[1].children[0].value)||0;
        let price = parseFloat(tr.children[2].children[0].value)||0;

        let total = qty*price;
        tr.querySelector(".t").innerText = f(total);
        subtotal+=total;
    });

    let vat = subtotal*0.19;
    let net = subtotal+vat+1;

    sub.innerText = f(subtotal);
    vatEl.innerText = f(vat);
    netEl.innerText = f(net);

    pNumber.innerText = "#"+docNumber.value;

    pClient.innerHTML =
        `${clientName.value}<br>
         ${clientAddress.value}<br>
         Tax: ${taxId.value}<br>
         Payment: ${payment.value}`;

    localStorage.setItem("invoice", JSON.stringify(getData()));
}

function getData(){
    let items=[];
    document.querySelectorAll("#rows tr").forEach(tr=>{
        items.push({
            desc:tr.children[0].children[0].value,
            qty:tr.children[1].children[0].value,
            price:tr.children[2].children[0].value
        });
    });

    return {
        docNumber:docNumber.value,
        clientName:clientName.value,
        clientAddress:clientAddress.value,
        taxId:taxId.value,
        payment:payment.value,
        items
    };
}

function load(){
    let d = JSON.parse(localStorage.getItem("invoice")||"{}");

    docNumber.value=d.docNumber||"0001-26";
    clientName.value=d.clientName||"";
    clientAddress.value=d.clientAddress||"";
    taxId.value=d.taxId||"";
    payment.value=d.payment||"Cash";

    (d.items?.length ? d.items : [{}]).forEach(addRow);
}

function printPDF(){
    document.title="DeliveryNote-"+docNumber.value;
    window.print();
}

document.querySelectorAll("input,select")
.forEach(i=>i.addEventListener("input",update));

load();
</script>

</body>
</html>

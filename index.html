<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VANOA Delivery Note</title>

<link rel="icon" type="image/svg+xml" href="https://cdn.jsdelivr.net/gh/ShadowHD6/VANOA-Delivery-Note@main/Vanoa%20Favicom.svg">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
:root {
    --bg: #f6f7f9;
    --text: #111;
    --muted: #6b7280;
    --line: #e5e7eb;
}
* { box-sizing: border-box; }

body {
    margin: 0;
    font-family: Inter, sans-serif;
    background: var(--bg);
    color: var(--text);
}

.layout { display: flex; min-height: 100vh; }

/* SIDEBAR */
.sidebar {
    width: 340px;
    background: #0a0a0a;
    color: #fff;
    padding: 18px;
    height: 100vh;
    position: sticky;
    top: 0;
    overflow-y: auto;
    z-index: 10;
}
.sidebar.collapsed { width: 70px; }
.sidebar.collapsed .content { display: none; }

.toggle {
    width: 100%;
    padding: 10px;
    background: #fff;
    border: none;
    font-weight: 700;
    cursor: pointer;
    margin-bottom: 12px;
}

.sidebar h3 {
    font-size: 14px;
    margin-top: 20px;
    color: #aaa;
    text-transform: uppercase;
}

input, select {
    width: 100%;
    padding: 10px;
    margin-top: 6px;
    border-radius: 8px;
    border: none;
    outline: none;
    background: #222;
    color: #fff;
}

input::placeholder { color: #666; }

.btn-group { margin-top: 25px; display: flex; flex-direction: column; gap: 10px; }
.btn { padding: 12px; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; }
.btn-add { background: #fff; color: #000; }
.btn-pdf { background: #22c55e; color: #fff; }
.btn-img { background: #3b82f6; color: #fff; }

/* MAIN */
.main {
    flex: 1;
    padding: 40px;
    display: flex;
    justify-content: center;
    background: #525659;
}

.card {
    width: 210mm;
    height: 297mm;
    background: #fff;
    padding: 15px;
    box-shadow: 0 10px 50px rgba(0,0,0,0.3);
}

.card-inner {
    border: 1mm solid #000;
    height: 100%;
    padding: 40px;
    display: flex;
    flex-direction: column;
    position: relative;
}

.header {
    display: flex;
    justify-content: space-between;
    margin-bottom: 40px;
}

.logo img { width: 4.5cm; }

.doc-title h1 { margin: 0; font-size: 34px; font-weight: 900; }
.doc-meta { font-size: 13px; color: var(--muted); }

.grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 40px;
    margin-bottom: 55px;
}

.block-title {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    border-bottom: 2px solid #000;
}

.info-content { font-size: 14px; }

table { width: 100%; border-collapse: collapse; }
th { background: #000; color: #fff; padding: 12px; font-size: 11px; }
td { border-bottom: 1px solid var(--line); }

td input {
    background: transparent;
    padding: 12px;
    color: #000;
    width: 100%;
    border: none;
}

.totals-wrapper {
    display: flex;
    justify-content: flex-end;
    margin-top: auto;
    margin-bottom: 100px;
}

.totals { width: 280px; }

.row {
    display: flex;
    justify-content: space-between;
    padding: 6px 0;
}

.grand {
    border-top: 2px solid #000;
    margin-top: 8px;
    padding-top: 10px;
    font-weight: 900;
    font-size: 20px;
}

.footer {
    position: absolute;
    bottom: 20px;
    left: 40px;
    right: 40px;
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: var(--muted);
}

.hide-on-export { width: 40px; text-align: center; }

/* PRINT FIX */
@media print {
    body { background: white; }
    .sidebar { display: none !important; }
    .main { padding: 0; background: white; }
    .card { box-shadow: none; margin: 0; }
    .hide-on-export { display: none !important; }
}
</style>
</head>

<body>

<div class="layout">
<div class="sidebar">
    <button class="toggle" onclick="toggle()">☰</button>
    <div class="content">
        <button class="btn btn-add" onclick="addRow()">+ Add Item</button>
        <button class="btn btn-pdf" onclick="exportPDF()">Print PDF</button>
        <button class="btn btn-img" onclick="exportImage()">Download Image</button>
    </div>
</div>

<div class="main">
<div class="card" id="documentCard">
<div class="card-inner">

<div class="header">
    <img src="https://raw.githubusercontent.com/ShadowHD6/VANOA-Delivery-Note/main/VANOA%20Logo.svg">
    <div class="doc-title">
        <h1>Delivery Note</h1>
        <div id="pNumber">#0001</div>
        <div id="pDate"></div>
    </div>
</div>

<table id="itemsTable">
<thead>
<tr>
<th>Description</th>
<th>Qty</th>
<th>Unit</th>
<th>Total</th>
<th class="hide-on-export"></th>
</tr>
</thead>
<tbody id="rows"></tbody>
</table>

</div>
</div>
</div>
</div>

<script>
function toggle() {
    document.querySelector(".sidebar").classList.toggle("collapsed");
}

function addRow() {
    const tr = document.createElement("tr");
    tr.innerHTML = `
        <td><input class="desc"></td>
        <td><input class="qty" value="1"></td>
        <td><input class="unit" value="0"></td>
        <td class="total-cell">0</td>
        <td class="hide-on-export"><button onclick="this.closest('tr').remove()">X</button></td>
    `;
    document.getElementById("rows").appendChild(tr);
}

/* ✅ VECTOR PDF */
function exportPDF() {
    window.print();
}

/* ✅ SHARP IMAGE */
async function exportImage() {
    const canvas = await html2canvas(document.getElementById('documentCard'), {
        scale: window.devicePixelRatio * 2,
        useCORS: true
    });

    const link = document.createElement('a');
    link.download = "document.png";
    link.href = canvas.toDataURL();
    link.click();
}

addRow();
</script>

</body>
</html>
